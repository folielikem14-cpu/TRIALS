<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaNote — Download Started</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edff;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      padding: 1rem;
    }

    .panel {
      max-width: 640px;
      width: 100%;
      background: #141b33;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 16px;
      padding: 1.4rem;
      text-align: center;
    }

    h1 { margin-top: 0; }

    p {
      color: #afbcde;
      line-height: 1.5;
    }

    .cta {
      margin-top: .7rem;
      display: inline-block;
      text-decoration: none;
      background: linear-gradient(90deg, #5eead4, #60a5fa);
      color: #0b1020;
      border-radius: 10px;
      font-weight: 700;
      padding: .7rem 1rem;
    }

    ul {
      text-align: left;
      color: #c7d4f4;
      margin: 1rem auto;
      max-width: 420px;
    }
  </style>
</head>
<body>
  <section class="panel">
    <h1 id="title">Preparing your download…</h1>
    <p id="message"></p>
    <ul>
      <li>Keep your installer up to date for latest security patches.</li>
      <li>Sign in with the same account to sync your notes.</li>
      <li>Need help? Visit our support center from the app menu.</li>
    </ul>
    <a class="cta" href="index.html">Back to downloads</a>
  </section>

  <script>
    const params = new URLSearchParams(window.location.search);
    const platform = params.get('platform') || 'your platform';
    const subscriberEmail = localStorage.getItem('subscriberEmail');

    const title = document.getElementById('title');
    const message = document.getElementById('message');

    if (platform === 'Newsletter') {
      title.textContent = 'You are subscribed!';
      message.textContent = subscriberEmail
        ? `Thanks! ${subscriberEmail} will receive product updates and release alerts.`
        : 'Thanks! You will receive product updates and release alerts.';
    } else {
      title.textContent = `${platform} download is starting.`;
      message.textContent = `If your ${platform} download did not begin automatically, click back and try again.`;
    }
  </script>
</body>
</html>
